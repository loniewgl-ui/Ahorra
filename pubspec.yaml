name: ahorra
description: A personal finance tracker app with Firebase authentication and Firestore database.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  
  # State Management
  provider: ^6.1.2
  
  # Storage & Preferences
  shared_preferences: ^2.2.3
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.0.0
  crypto: ^3.0.3
  
  # Firebase Core
  firebase_core: ^3.0.0
  
  # Firebase Authentication
  firebase_auth: ^5.0.0
  google_sign_in: ^6.0.0
  flutter_facebook_auth: ^7.0.0
  
  # Firebase Database
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  
  # Media
  image_picker: ^0.8.9

  # Local Notifications
  flutter_local_notifications: ^17.0.0
  url_launcher: ^6.3.2
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/